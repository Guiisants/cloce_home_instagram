<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css"> <!-- Estou linkando tudo para o css -->
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
</head>
<body>
    <main>
        <div id="main container">
            <!-- Fiz o banner Container -->
            <div id="banner container">
                <img src="img/banner2.png" alt="Crie uma conta no Instagram">
            </div>
            <!-- Aqui vamos realizar o Login e Registro-->
             <!-- Posso usar o # que ele vai puxar a linha de codigo com div id e coloca "form-container"-->
              <div id="form-container">
                <div id="form-box">
                    <img src="/img/logo_instagram.png" alt="Instagram">
                    <form id="login-form">
                        <input 
                        type="text" 
                        name="username" 
                        placeholder="Número de telefone, usuário ou e-mail"
                        />
                        <input
                        type="password"
                        name="password"
                        placeholder="senha">
                        <input type="submit" value="Entrar" />
                        <!-- Realizei a primeira etapa de Login e Senha e botton de entrar, vamos ao commit -->
                         <div class="separator"></div>
                         <div class="line"></div>
                         <span>Ou</span>
                         <div id="other-links">
                            <div id="facebook-login">
                                <img src="/img/logo_facebook.svg" alt="Facebook Login" /> <!-- Icone do Facebook -->
                                <span>Entrar com o Facebook</span> <!-- Entra com o facebook, botão já estará lá-->
                            </div>
                            <div id="forgot-password"> <!-- Estamos colocando uma div para "Esqueceu a senha?"-->
                                <a href="#">Esqueceu a senha?</a> <!-- Link que colocamos para no caso de esquecer senha-->
                            </div>
                            <div id="register-container">
                                <p>Não tem uma conta?<a href="#">Cadastre-se</a></p> 
                            </div>
                            <div id="get-app-container"></div>
                            <p>Obtenha o aplicativo.</p>
                            <a href="#">
                                <img src="/img/apple_btn.png" alt="Apple Store" />
                            </a>
                            <a href="#" alt="Google Play" />
                                <img src="/img/gplay_btn.png" alt="Google Play" />
                            </p>
                         </div>
                    </form>
                </div>
              </div>
        </div>
    </main>
    <footer>
        <nav>
            <ul id="footer-links">
            <li><a href="#"></a>Meta</li> <!--Aqui estamos colocando os links do rodapé, que são os links de informações do Instagram -->
            <li><a href="#"></a>Blogspot</li>
            <li><a href="#"></a>API</li>
            <li><a href="#"></a>Principais</li>
            <li><a href="#"></a>Termos</li>
            <li><a href="#"></a>Hastags</li>
            <li><a href="#"></a>Ajuda</li>
            <li><a href="#"></a>Sobre</li>
            <li><a href="#"></a>Privacidade</li>
            <li><a href="#"></a>Localização</li>
            <li><a href="#"></a>Instagram Lite</li>
            </ul>
        </nav>
        <p id="copyright">&copy;2022 Instagram from Meta </p> <!-- Eu coloquei a parte de baixo para mostrar o texto de copyright -->
    </footer>

</body>
</html>
